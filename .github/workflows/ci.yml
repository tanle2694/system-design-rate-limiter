name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_unit_tests:
        description: 'Run unit tests'
        type: boolean
        default: true
      run_integration_tests:
        description: 'Run integration tests'
        type: boolean
        default: true
      run_snyk_scan:
        description: 'Run Snyk security scan'
        type: boolean
        default: false
      run_sonarqube_scan:
        description: 'Run SonarQube analysis'
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_unit_tests }}
        run: >-
          dotnet test tests/RateLimiter.UnitTests/RateLimiter.UnitTests.csproj
          --no-build --configuration Release
          --logger trx --results-directory TestResults/unit
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Run integration tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_integration_tests }}
        env:
          REDIS_ENDPOINT: localhost:6379
        run: >-
          dotnet test tests/RateLimiter.IntegrationTests/RateLimiter.IntegrationTests.csproj
          --no-build --configuration Release
          --logger trx --results-directory TestResults/integration
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Merge coverage reports
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:CoverageReport \
            -reporttypes:"Cobertura;HtmlSummary;MarkdownSummaryGithub"

      - name: Publish coverage summary
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: CoverageReport/SummaryGithub.md

      - name: Write coverage to job summary
        if: always()
        run: cat CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_unit_tests) }}
        with:
          name: Unit Tests
          path: TestResults/unit/*.trx
          reporter: dotnet-trx

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_integration_tests) }}
        with:
          name: Integration Tests
          path: TestResults/integration/*.trx
          reporter: dotnet-trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/**/*.trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: CoverageReport/

  snyk-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_snyk_scan }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

  sonarqube-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_sonarqube_scan }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarQube analysis
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: End SonarQube analysis
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_unit_tests:
        description: 'Run unit tests'
        type: boolean
        default: true
      run_integration_tests:
        description: 'Run integration tests'
        type: boolean
        default: true
      run_snyk_scan:
        description: 'Run Snyk security scan'
        type: boolean
        default: true
      run_sonarqube_scan:
        description: 'Run SonarQube analysis'
        type: boolean
        default: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_unit_tests }}
        run: dotnet test tests/RateLimiter.UnitTests/RateLimiter.UnitTests.csproj --no-build --configuration Release --logger trx --results-directory TestResults/unit

      - name: Run integration tests
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_integration_tests }}
        run: dotnet test tests/RateLimiter.IntegrationTests/RateLimiter.IntegrationTests.csproj --no-build --configuration Release --logger trx --results-directory TestResults/integration

      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_unit_tests) }}
        with:
          name: Unit Tests
          path: TestResults/unit/*.trx
          reporter: dotnet-trx

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_integration_tests) }}
        with:
          name: Integration Tests
          path: TestResults/integration/*.trx
          reporter: dotnet-trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/**/*.trx

  snyk-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_snyk_scan }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

  sonarqube-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_sonarqube_scan }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarQube analysis
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: End SonarQube analysis
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

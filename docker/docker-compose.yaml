services:
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rate-limiter-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Redis__ConnectionString=redis:6379
      - Redis__InstanceName=rate-limiter
      - "Redis__KeyPrefix=rl:"
      - RateLimiter__Enabled=true
      - RateLimiter__EnableHeaders=true
      - RateLimiter__DefaultLimit=100
      - RateLimiter__DefaultWindowSeconds=60
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
